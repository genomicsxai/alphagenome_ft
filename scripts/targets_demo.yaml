heads:
  - name: my_rna_head
    source: predefined
    config:
      name: rna_seq
      resolutions: [1, 128]
      apply_squashing: true
    targets:
      - bigwig: /path/to/my_rna_1.bigwig
        label: my_rna_1
      - bigwig: /path/to/my_rna_2.bigwig
        label: my_rna_2
  - name: my_atac_head
    source: predefined
    config:
      name: atac
      resolutions: [1, 128]
      apply_squashing: false
    targets:
      - bigwig: /path/to/my_atac_1.bigwig
