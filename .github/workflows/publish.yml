# Publish to PyPI when a version tag (v*) is pushed.
# Usage: bump version in pyproject.toml, commit, then:
#   git tag v0.1.2 && git push origin v0.1.2
#
# One-time setup: enable Trusted Publishing on PyPI:
#   https://pypi.org/manage/project/alphagenome-ft/settings/publishing/
# Add trusted publisher: Owner + Repository + Workflow name: publish.yml
# Optional: create GitHub environment "pypi" and select it here and in PyPI.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Store dist for publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    # optional: add "environment: pypi" and create that env in GitHub for approval gates
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
