name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jax jaxlib dm-haiku orbax-checkpoint
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install git+https://github.com/google-deepmind/alphagenome.git
          pip install git+https://github.com/google-deepmind/alphagenome_research.git
          pip install -e ".[test]"
      
      - name: Debug environment
        run: |
          pip freeze
          python -c "import optax; print('optax OK')"

      - name: Verify AlphaGenome stack imports
        run: |
          python -c "import orbax.checkpoint as ocp; import flax; print('orbax+flax OK')"
          python -c "from alphagenome_research.model import dna_model; print('dna_model OK')"
      
      - name: Run unit tests
        run: |
          pytest

